version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: phone_store_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: PhoneStore
      MYSQL_USER: phone_user
      MYSQL_PASSWORD: phone_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: phone_store_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: phone_user
      DB_PASSWORD: phone_pass
      DB_NAME: PhoneStore
      DB_PORT: 3306
      JWT_SECRET: secretkey
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    command: npm start

volumes:
  db_data:
